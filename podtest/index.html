<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSU Motion Bridge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        :root {
            --bg-color: #0f0f13;
            --panel-bg: rgba(30, 30, 35, 0.75);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --border-radius: 12px;
            --input-bg: rgba(0, 0, 0, 0.3);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 3D Canvas Background */
        #viz-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #1a1a20 0%, #000000 100%);
        }

        /* Floating Control Panel */
        .dashboard-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.3s ease;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .app-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-row {
            display: flex;
            gap: 10px;
        }

        label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Monaco', monospace;
        }

        input:focus {
            border-color: var(--accent-color);
            background-color: rgba(0, 0, 0, 0.5);
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-stop {
            background: linear-gradient(135deg, var(--danger-color), #b91c1c);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-icon {
            padding: 0;
            width: 40px;
            flex-shrink: 0;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        
        .btn-icon:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .status-badge.connected {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--success-color);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .status-badge.disconnected {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--danger-color);
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Data Monitor Panel */
        .monitor-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 260px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            z-index: 10;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .monitor-title {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .data-val {
            color: var(--accent-color);
            font-weight: bold;
        }

        #scan-msg {
            font-size: 11px;
            color: var(--warning-color);
            min-height: 1.2em;
            text-align: center;
            margin-top: 5px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .dashboard-panel {
                width: calc(100% - 48px);
                top: auto;
                bottom: 24px;
                left: 24px;
            }
            .monitor-panel {
                top: 24px;
                bottom: auto;
                right: 24px;
                left: 24px;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- 3D Visualization Background -->
    <div id="viz-container"></div>

    <!-- Main Control Panel -->
    <div class="dashboard-panel">
        <div class="app-header">
            <div class="app-title">DSU Motion Bridge</div>
            <div id="status-indicator" class="status-badge disconnected">● DISCONNECTED</div>
        </div>

        <div class="control-group">
            <label for="ip">Target IP Address</label>
            <div class="control-row">
                <input type="text" id="ip" value="${ESP_IP}" placeholder="192.168.x.x">
                <button id="btnScan" class="btn-icon" onclick="scanDevice()" title="Scan Network">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <div class="control-group">
            <label for="port">DSU Port</label>
            <input type="number" id="port" value="${ESP_PORT}">
        </div>

        <div style="margin-top: 10px;">
            <button id="btnStart" class="btn-primary" style="width: 100%;" onclick="toggleService()">
                START SERVICE
            </button>
        </div>
        
        <div id="scan-msg"></div>
    </div>

    <!-- Data Monitor -->
    <div class="monitor-panel">
        <div class="monitor-title">Telemetry Data</div>
        <div id="telemetry-data">
            <div style="text-align: center; color: #555; padding: 10px;">Waiting for stream...</div>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://' + location.host);
        const btn = document.getElementById('btnStart');
        const ipInput = document.getElementById('ip');
        const portInput = document.getElementById('port');
        const statusBadge = document.getElementById('status-indicator');
        const telemetryDiv = document.getElementById('telemetry-data');
        const scanMsg = document.getElementById('scan-msg');

        let isRunning = false;
        let currentMode = 'BRIDGE';
        let lastMotionData = null;

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.type === 'status') {
                currentMode = msg.mode;
                updateStatus(msg);
            } else if (msg.type === 'motion') {
                lastMotionData = msg;
                telemetryDiv.innerHTML = `
                    <div class="data-row"><span>Accel X</span><span class="data-val">${msg.accel.x.toFixed(3)}</span></div>
                    <div class="data-row"><span>Accel Y</span><span class="data-val">${msg.accel.y.toFixed(3)}</span></div>
                    <div class="data-row"><span>Accel Z</span><span class="data-val">${msg.accel.z.toFixed(3)}</span></div>
                    <div style="height:8px"></div>
                    <div class="data-row"><span>Pitch</span><span class="data-val">${msg.gyro.pitch.toFixed(2)}°</span></div>
                    <div class="data-row"><span>Yaw</span><span class="data-val">${msg.gyro.yaw.toFixed(2)}°</span></div>
                    <div class="data-row"><span>Roll</span><span class="data-val">${msg.gyro.roll.toFixed(2)}°</span></div>
                `;
            } else if (msg.type === 'scan_result') {
                ipInput.value = msg.ip;
                scanMsg.style.color = 'var(--success-color)';
                scanMsg.textContent = `Found: ${msg.ip}`;
                // Flash input
                ipInput.style.borderColor = 'var(--success-color)';
                setTimeout(() => ipInput.style.borderColor = '', 1000);
            } else if (msg.type === 'scan_timeout') {
                scanMsg.style.color = 'var(--warning-color)';
                scanMsg.textContent = 'Scan timed out. No device found.';
            }
        };

        function updateStatus(msg) {
            isRunning = msg.running;
            
            // Bridge 模式下，启动按钮通常是禁用的或仅作为指示
            if (currentMode === 'BRIDGE') {
                btn.style.display = 'none'; // Bridge 模式自动运行，隐藏按钮
                statusBadge.textContent = '● BRIDGE ACTIVE';
                statusBadge.className = 'status-badge connected';
                ipInput.disabled = true;
                portInput.disabled = true;
            } else {
                // SIM 模式
                btn.style.display = 'inline-block';
                if (isRunning) {
                    btn.textContent = 'STOP POLLING';
                    btn.className = 'btn-stop';
                    statusBadge.textContent = '● CONNECTED';
                    statusBadge.className = 'status-badge connected';
                    ipInput.disabled = true;
                    portInput.disabled = true;
                } else {
                    btn.textContent = 'START POLLING';
                    btn.className = 'btn-primary';
                    statusBadge.textContent = '● DISCONNECTED';
                    statusBadge.className = 'status-badge disconnected';
                    ipInput.disabled = false;
                    portInput.disabled = false;
                }
            }
        }

        function toggleService() {
            if (currentMode === 'BRIDGE') return;

            if (!isRunning) {
                const ip = ipInput.value.trim();
                const port = parseInt(portInput.value);
                if (!ip) {
                    alert('请输入目标 IP');
                    return;
                }
                ws.send(JSON.stringify({ cmd: 'start', ip, port }));
            } else {
                ws.send(JSON.stringify({ cmd: 'stop' }));
            }
        }

        function scanDevice() {
            scanMsg.style.color = 'var(--text-secondary)';
            scanMsg.textContent = "Scanning network...";
            ws.send(JSON.stringify({ cmd: 'scan' }));
        }

        // ================= 3D Logic =================
        let camera, scene, renderer, gamepadGroup;

        function init3D() {
            const container = document.getElementById('viz-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            scene = new THREE.Scene();
            // scene.background = new THREE.Color(0x333333); // 移除背景色，让 CSS 背景透出来

            camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 100);
            camera.position.set(0, 1.5, 3.5); // 稍微拉近一点视角
            camera.lookAt(0, 0, 0);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(2, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x808080));

            // 创建一个容器组，用于旋转控制
            gamepadGroup = new THREE.Group();
            scene.add(gamepadGroup);

            // 加载 Xbox One 手柄模型 (来自 WebXR Assets)
            const loader = new THREE.GLTFLoader();
            const modelUrl = 'https://cdn.jsdelivr.net/npm/@webxr-input-profiles/assets@1.0/dist/profiles/microsoft-xbox-one-controller/microsoft-xbox-one-controller.glb';
            
            loader.load(modelUrl, function (gltf) {
                const model = gltf.scene;
                // 调整模型大小 (WebXR 模型单位是米，比较小，需要放大)
                model.scale.set(10, 10, 10); 
                // 调整初始角度，让手柄正面朝向摄像机
                model.rotation.x = -Math.PI / 4; 
                
                gamepadGroup.add(model);
                
                // 移除加载中的提示或添加特效（可选）
                console.log('Gamepad model loaded');
            }, undefined, function (error) {
                console.error('An error happened loading the model:', error);
            });

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                const w = container.clientWidth;
                const h = container.clientHeight;
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (lastMotionData && gamepadGroup) {
                const ax = lastMotionData.accel.x;
                const ay = lastMotionData.accel.y;
                const az = lastMotionData.accel.z;
                // 简单的 Pitch/Roll 计算
                const pitch = Math.atan2(ay, Math.sqrt(ax * ax + az * az));
                const roll = Math.atan2(-ax, Math.sqrt(ay * ay + az * az));

                gamepadGroup.rotation.x = THREE.Math.lerp(gamepadGroup.rotation.x, pitch, 0.1);
                gamepadGroup.rotation.z = THREE.Math.lerp(gamepadGroup.rotation.z, roll, 0.1);
            } else if (gamepadGroup) {
                // Idle animation
                gamepadGroup.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }

        init3D();
    </script>
</body>
</html>
