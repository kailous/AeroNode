<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DSU Simulator & Visualization</title>
    <!-- 引入 Three.js 用于 3D 显示 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 顶部控制面板 */
        .controls { 
            background: #f0f0f0; border-bottom: 1px solid #ccc; padding: 10px 20px; 
            display: flex; align-items: center; gap: 15px; flex-shrink: 0; z-index: 10;
        }
        .form-group { display: flex; align-items: center; gap: 5px; }
        label { font-weight: bold; font-size: 14px; }
        input { padding: 5px; width: 140px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 6px 15px; cursor: pointer; border: none; border-radius: 4px; font-size: 14px; color: white; }
        .btn-start { background-color: #28a745; }
        .btn-stop { background-color: #dc3545; }
        #status { font-weight: bold; margin-left: 10px; }

        /* 3D 视图容器 */
        #viz-container { flex-grow: 1; position: relative; background: #222; width: 100%; }
        
        /* 浮动日志 */
        #log { 
            position: absolute; bottom: 10px; left: 10px; 
            background: rgba(0, 0, 0, 0.7); color: #0f0; 
            padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 顶部管理栏 -->
    <div class="controls">
        <div class="form-group">
            <label>IP:</label>
            <input type="text" id="ip" value="${ESP_IP}" placeholder="请输入IP地址">
        </div>
        <div class="form-group">
            <label>Port:</label>
            <input type="number" id="port" value="${ESP_PORT}">
        </div>
        <button id="btnStart" class="btn-start" onclick="toggleService()">启动服务</button>
        <span id="status">状态: 未连接</span>
    </div>

    <!-- 3D 显示区域 -->
    <div id="viz-container">
        <div id="log">等待数据...</div>
    </div>

    <script>
        // ================= 1. WebSocket & 控制逻辑 =================
        const ws = new WebSocket('ws://' + location.host);
        const btn = document.getElementById('btnStart');
        const ipInput = document.getElementById('ip');
        const portInput = document.getElementById('port');
        const statusSpan = document.getElementById('status');
        const logDiv = document.getElementById('log');

        let isRunning = false;
        let lastMotionData = null; // 存储最新的运动数据供 3D 使用

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.type === 'status') {
                updateStatus(msg);
            } else if (msg.type === 'motion') {
                lastMotionData = msg;
                // 简单显示数值
                logDiv.innerHTML = `Accel: X=${msg.accel.x.toFixed(2)} Y=${msg.accel.y.toFixed(2)} Z=${msg.accel.z.toFixed(2)}<br>` +
                                   `Gyro:  P=${msg.gyro.pitch.toFixed(2)} Y=${msg.gyro.yaw.toFixed(2)} R=${msg.gyro.roll.toFixed(2)}`;
            }
        };

        function updateStatus(msg) {
            isRunning = msg.running;
            if (isRunning) {
                btn.textContent = '停止服务';
                btn.className = 'btn-stop';
                statusSpan.textContent = '状态: 运行中 (' + msg.ip + ':' + msg.port + ')';
                statusSpan.style.color = 'green';
                ipInput.disabled = true;
                portInput.disabled = true;
            } else {
                btn.textContent = '启动服务';
                btn.className = 'btn-start';
                statusSpan.textContent = '状态: 未连接';
                statusSpan.style.color = 'red';
                ipInput.disabled = false;
                portInput.disabled = false;
            }
        }

        function toggleService() {
            if (!isRunning) {
                const ip = ipInput.value.trim();
                const port = parseInt(portInput.value);
                if (!ip) {
                    statusSpan.textContent = '状态: 请输入IP地址';
                    statusSpan.style.color = 'orange';
                    return;
                }
                ws.send(JSON.stringify({ cmd: 'start', ip, port }));
            } else {
                ws.send(JSON.stringify({ cmd: 'stop' }));
            }
        }

        // ================= 2. Three.js 3D 可视化逻辑 =================
        let camera, scene, renderer, cube;

        function init3D() {
            const container = document.getElementById('viz-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333333);

            // 相机
            camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 100);
            camera.position.set(0, 2, 4);
            camera.lookAt(0, 0, 0);

            // 灯光
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(2, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 物体 (模拟手柄/开发板)
            const geometry = new THREE.BoxGeometry(1.5, 0.2, 0.8);
            const material = new THREE.MeshPhongMaterial({ color: 0x00aaff });
            cube = new THREE.Mesh(geometry, material);
            
            // 坐标轴辅助
            const axesHelper = new THREE.AxesHelper(2);
            cube.add(axesHelper);
            
            scene.add(cube);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            // 窗口大小调整
            window.addEventListener('resize', () => {
                const w = container.clientWidth;
                const h = container.clientHeight;
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (lastMotionData) {
                // 简单的姿态映射 (利用加速度计计算 Pitch/Roll)
                // 注意：这只是一个基础的可视化，没有做复杂的传感器融合
                const ax = lastMotionData.accel.x;
                const ay = lastMotionData.accel.y;
                const az = lastMotionData.accel.z;

                // 计算 Pitch (绕 X 轴) 和 Roll (绕 Z 轴)
                // 根据具体的传感器安装方向，这里可能需要调整符号或轴
                const pitch = Math.atan2(ay, Math.sqrt(ax * ax + az * az));
                const roll = Math.atan2(-ax, Math.sqrt(ay * ay + az * az));

                // 平滑插值
                cube.rotation.x = THREE.Math.lerp(cube.rotation.x, pitch, 0.1);
                cube.rotation.z = THREE.Math.lerp(cube.rotation.z, roll, 0.1);
                
                // Yaw (Y轴) 通常需要磁力计或陀螺仪积分，这里暂时不动，或者你可以加上陀螺仪的积分逻辑
            }

            renderer.render(scene, camera);
        }

        // 启动 3D
        init3D();
    </script>
</body>
</html>
